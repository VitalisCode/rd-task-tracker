input {
  beats {
    port => 5044
  }
}

filter {
  # Parse the JSON logs from FastAPI
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "parsed"
    }

    mutate {
      add_field => {
        "log_level"   => "%{[parsed][level]}"
        "log_message" => "%{[parsed][message]}"
        "log_time"    => "%{[parsed][time]}"
      }
      remove_field => ["message", "parsed"]
    }
  }

  # Add Kubernetes metadata as searchable fields
  mutate {
    add_field => {
      "k8s_namespace" => "%{[kubernetes][namespace]}"
      "k8s_pod"       => "%{[kubernetes][pod][name]}"
      "k8s_container" => "%{[kubernetes][container][name]}"
    }
  }

  # Tag errors so they're easy to filter in Kibana
  if [log_level] == "ERROR" {
    mutate { add_tag => ["error"] }
  }
}

output {
  elasticsearch {
    hosts    => ["https://elasticsearch-master:9200"]
    index    => "rd-tracker-logs-%{+YYYY.MM.dd}"
    user     => "elastic"
    password => "${ELASTICSEARCH_PASSWORD}"
    ssl_certificate_verification => false
  }

  # Debug: also print to stdout
  stdout {
    codec => rubydebug
  }
}
loki:
  enabled: true
  isDefault: true

  # Storage — filesystem for demo, use S3 in production
  persistence:
    enabled: true
    size: 10Gi

  config:
    auth_enabled: false

    ingester:
      chunk_idle_period: 3m
      chunk_block_size: 262144
      chunk_retain_period: 1m
      max_transfer_retries: 0

    limits_config:
      enforce_metric_name: false
      reject_old_samples: true
      reject_old_samples_max_age: 168h   # 1 week

    schema_config:
      configs:
        - from: 2024-01-01
          store: boltdb-shipper
          object_store: filesystem
          schema: v11
          index:
            prefix: index_
            period: 24h

    storage_config:
      boltdb_shipper:
        active_index_directory: /data/loki/boltdb-shipper-active
        cache_location: /data/loki/boltdb-shipper-cache
        shared_store: filesystem
      filesystem:
        directory: /data/loki/chunks

promtail:
  enabled: true
  config:
    # Tell promtail which logs to scrape
    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          # Only scrape pods in our namespace
          - source_labels: [__meta_kubernetes_namespace]
            action: keep
            regex: rd-staging

          # Add labels so we can filter in Grafana
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

        # Parse JSON logs from FastAPI
        pipeline_stages:
          - json:
              expressions:
                level: level
                message: message
                time: time
          - labels:
              level:
          - timestamp:
              source: time
              format: RFC3339
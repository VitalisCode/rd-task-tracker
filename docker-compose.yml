version: "3.9"

services:
  api:
    build:
      context: ./services/api
      target: production
    container_name: rd-api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - rd-network

  frontend:
    build:
      context: ./services/frontend
      target: production
    container_name: rd-frontend
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - rd-network

networks:
  rd-network:
    driver: bridge
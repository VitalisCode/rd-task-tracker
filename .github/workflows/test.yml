name: Test

on:
  workflow_call:

jobs:
# Running tests with pytest to ensure that the API service functions as expected and to catch any issues before they reach production.
# pytest is a tool for testing Python applications.
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: services/api
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov "httpx<0.28"

      - name: Run tests
        working-directory: services/api
        run: |
          if [ -d tests ]; then
            pytest tests/ -v --tb=short --cov=. --cov-report=xml:coverage.xml
          else
            python -m py_compile main.py
          fi

      - name: Build frontend test image
        working-directory: services/frontend
        run: |
          docker build --target builder -t rd-task-tracker-frontend-test .
name: R&D Task Tracker CI/CD

on:
  push:
    branches:
      - main
      - develop

  pull_request:

permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

  API_IMAGE: ${{ secrets.ECR_REGISTRY }}/rd-task-tracker/api
  FRONTEND_IMAGE: ${{ secrets.ECR_REGISTRY }}/rd-task-tracker/frontend

jobs:

  validate:
    uses: ./.github/workflows/validate.yml

  security-review:
    needs: validate
    uses: ./.github/workflows/security-review.yml

  test:
    needs: security-review
    uses: ./.github/workflows/test.yml

  build-api:
    needs: test
    uses: ./.github/workflows/build-cscan-push-api.yml

  build-frontend:
    needs: test
    uses: ./.github/workflows/build-cscan-push-front.yml

  deploy-staging:
    needs:
      - build-api
      - build-frontend
    uses: ./.github/workflows/deploy-staging.yml

  deploy-prod:
    needs: deploy-staging
    uses: ./.github/workflows/deploy-prod.yml